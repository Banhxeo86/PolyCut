<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>입체도형 단면 마스터 | AI-ON</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --glass-bg: rgba(255, 255, 255, 0.98);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f8fafc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #viewport-wrapper {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #ffffff 0%, #e2e8f0 100%);
            overflow: hidden;
            cursor: grab;
            touch-action: none;
        }

        #slice-line {
            position: absolute;
            height: 2px;
            background: var(--primary);
            display: none;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 0 8px var(--primary);
        }

        #section-preview {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 150px;
            background: var(--glass-bg);
            border-radius: 20px;
            border: 2px solid var(--primary);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        #section-preview.visible {
            opacity: 1;
        }

        #section-preview canvas {
            width: 110px;
            height: 110px;
        }

        #color-picker {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 200;
            background: var(--glass-bg);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
        }

        .color-dot {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .color-dot:hover {
            transform: scale(1.2);
        }

        .ui-bottom {
            background: #fff;
            padding: 1.2rem;
            border-top: 1px solid #e2e8f0;
            z-index: 300;
        }

        .control-panel {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            background: #fff;
            color: #475569;
            transition: all 0.2s;
        }

        button.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .btn-reset {
            background: #ef4444;
            color: #fff;
            border: none;
        }

        .hint {
            text-align: center;
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 700;
        }

        .mode-toggle {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            padding: 6px;
            border-radius: 50px;
            display: flex;
            gap: 5px;
            box-shadow: var(--shadow);
            z-index: 1000;
            border: 1px solid #e2e8f0;
        }

        .mode-btn {
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #64748b;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: var(--primary);
            color: #fff;
        }

        #fixed-slice-btns {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 200;
        }

        .slice-btn {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 0.7rem;
            background: var(--glass-bg);
            border: 1px solid #e2e8f0;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="viewport-wrapper">
        <div id="slice-line"></div>
        <div id="section-preview">
            <p style="font-size:0.8rem; font-weight:800; margin-bottom:5px;">입체도형의 단면</p>
            <canvas id="mini-canvas"></canvas>
            <strong id="shape-name" style="color:var(--primary); font-size:0.9rem; margin-top:5px">단면</strong>
        </div>
        <div id="color-picker">
            <div class="color-dot" style="background:#3b82f6" onclick="changeColor('#3b82f6')"></div>
            <div class="color-dot" style="background:#ef4444" onclick="changeColor('#ef4444')"></div>
            <div class="color-dot" style="background:#10b981" onclick="changeColor('#10b981')"></div>
            <div class="color-dot" style="background:#f59e0b" onclick="changeColor('#f59e0b')"></div>
        </div>
        <div id="fixed-slice-btns">
            <button class="slice-btn" onclick="performFixedSlice('horizontal')">가로</button>
            <button class="slice-btn" onclick="performFixedSlice('vertical')">세로</button>
            <button class="slice-btn" onclick="performFixedSlice('diagonal')">사선</button>
        </div>
        <div class="mode-toggle">
            <button id="btn-rotate" class="mode-btn active" onclick="setMode('rotate')">🔄 회전</button>
            <button id="btn-slice" class="mode-btn" onclick="setMode('slice')">🔪 자르기</button>
        </div>
    </div>
    <div class="ui-bottom">
        <div class="control-panel">
            <div class="btn-group">
                <button class="btn-shape active" onclick="changeShape('box', this)">정육면체</button>
                <button class="btn-shape" onclick="changeShape('cylinder', this)">원기둥</button>
                <button class="btn-shape" onclick="changeShape('cone', this)">원뿔</button>
                <button class="btn-shape" onclick="changeShape('sphere', this)">구</button>
                <button class="btn-reset" onclick="resetView()">↻ 초기화</button>
            </div>
            <p id="mode-hint" class="hint">도형을 마우스로 돌려보세요!</p>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, currentMesh, planeMesh, stencilGroup, clippingPlane;
        let shapeColor = 0x3b82f6;
        let currentShapeType = 'box';
        let interactionMode = 'rotate';
        let startPoint = null;

        const wrapper = document.getElementById('viewport-wrapper');
        const miniCanvas = document.getElementById('mini-canvas');
        const ctx = miniCanvas.getContext('2d');
        miniCanvas.width = 110; miniCanvas.height = 110;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(35, wrapper.clientWidth / wrapper.clientHeight, 0.1, 1000);
            camera.position.set(0, 5, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, stencil: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(wrapper.clientWidth, wrapper.clientHeight);
            renderer.setClearColor(0xf8fafc, 1);
            renderer.localClippingEnabled = true;
            wrapper.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(5, 10, 7.5);
            scene.add(light);

            clippingPlane = new THREE.Plane(new THREE.Vector3(0, -1, 0), 10);
            createShape('box');

            renderer.domElement.addEventListener('pointerdown', onStart);
            renderer.domElement.addEventListener('pointermove', onMove);
            window.addEventListener('pointerup', onEnd);
            window.addEventListener('resize', onWindowResize);
        }

        function createShape(type) {
            if (currentMesh) {
                scene.remove(currentMesh);
                scene.remove(stencilGroup);
                scene.remove(planeMesh);
            }

            let geo;
            if (type === 'box') geo = new THREE.BoxGeometry(4, 4, 4);
            else if (type === 'cylinder') geo = new THREE.CylinderGeometry(2, 2, 5, 64);
            else if (type === 'cone') geo = new THREE.ConeGeometry(2.5, 5, 64);
            else geo = new THREE.SphereGeometry(2.5, 64, 64);

            const mat = new THREE.MeshStandardMaterial({
                color: shapeColor, clippingPlanes: [clippingPlane], side: THREE.FrontSide
            });
            currentMesh = new THREE.Mesh(geo, mat);
            currentMesh.renderOrder = 6;
            scene.add(currentMesh);

            // [Stencil Logic] 공식 예제 기반
            stencilGroup = new THREE.Group();
            const baseStencilMat = new THREE.MeshBasicMaterial({
                depthWrite: false, depthTest: true, colorWrite: false, stencilWrite: true,
                stencilFunc: THREE.AlwaysStencilFunc, side: THREE.DoubleSide, clippingPlanes: [clippingPlane]
            });

            const mat0 = baseStencilMat.clone();
            mat0.side = THREE.BackSide;
            mat0.stencilFail = mat0.stencilZFail = mat0.stencilZPass = THREE.IncrementWrapStencilOp;
            stencilGroup.add(new THREE.Mesh(geo, mat0));

            const mat1 = baseStencilMat.clone();
            mat1.side = THREE.FrontSide;
            mat1.stencilFail = mat1.stencilZFail = mat1.stencilZPass = THREE.DecrementWrapStencilOp;
            stencilGroup.add(new THREE.Mesh(geo, mat1));

            stencilGroup.renderOrder = 1;
            scene.add(stencilGroup);

            const planeGeo = new THREE.PlaneGeometry(100, 100);
            const planeMat = new THREE.MeshStandardMaterial({
                color: 0xfacc15, stencilWrite: true, stencilRef: 0,
                stencilFunc: THREE.NotEqualStencilFunc, side: THREE.DoubleSide
            });
            planeMesh = new THREE.Mesh(planeGeo, planeMat);
            planeMesh.renderOrder = 2;
            scene.add(planeMesh);

            currentShapeType = type;
            updatePlanePos();
        }

        function onStart(e) {
            if (interactionMode !== 'slice') return;
            startPoint = { x: e.clientX, y: e.clientY };
            const line = document.getElementById('slice-line');
            line.style.display = 'block';
            line.style.left = startPoint.x + 'px';
            line.style.top = startPoint.y + 'px';
            line.style.width = '0px';
        }

        function onMove(e) {
            if (!startPoint || interactionMode !== 'slice') return;
            const dx = e.clientX - startPoint.x;
            const dy = e.clientY - startPoint.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const line = document.getElementById('slice-line');
            line.style.width = dist + 'px';
            line.style.transform = `rotate(${Math.atan2(dy, dx)}rad)`;
            line.style.transformOrigin = '0 0';
        }

        function onEnd(e) {
            if (!startPoint || interactionMode !== 'slice') return;
            const dx = e.clientX - startPoint.x;
            const dy = e.clientY - startPoint.y;
            if (Math.sqrt(dx * dx + dy * dy) > 30) {
                const rect = wrapper.getBoundingClientRect();
                const x1 = ((startPoint.x - rect.left) / rect.width) * 2 - 1;
                const y1 = -((startPoint.y - rect.top) / rect.height) * 2 + 1;
                const x2 = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                const y2 = -((e.clientY - rect.top) / rect.height) * 2 + 1;

                const v1 = new THREE.Vector3(x1, y1, 0.5).unproject(camera);
                const v2 = new THREE.Vector3(x2, y2, 0.5).unproject(camera);
                const swipeDir = v2.sub(v1).normalize();
                const viewDir = camera.getWorldDirection(new THREE.Vector3());
                const normal = swipeDir.cross(viewDir).normalize();
                applySlice(normal);
            }
            startPoint = null;
            document.getElementById('slice-line').style.display = 'none';
        }

        function performFixedSlice(dir) {
            setMode('slice');
            let n = new THREE.Vector3(0, -1, 0);
            if (dir === 'vertical') n.set(-1, 0, 0);
            if (dir === 'diagonal') n.set(-1, 1, 0).normalize();
            applySlice(n);
        }

        function applySlice(n) {
            clippingPlane.normal.copy(n);
            clippingPlane.constant = 10;
            gsap.to(clippingPlane, {
                constant: 0, duration: 1, ease: "power2.out", onUpdate: updatePlanePos, onComplete: () => {
                    document.getElementById('section-preview').classList.add('visible');
                    drawMiniMap();
                }
            });
        }

        function drawMiniMap() {
            ctx.clearRect(0, 0, 110, 110);
            ctx.fillStyle = "#facc15"; ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 4;
            ctx.beginPath();
            if (currentShapeType === 'sphere' || (currentShapeType === 'cylinder' && Math.abs(clippingPlane.normal.y) > 0.8)) ctx.arc(55, 55, 35, 0, Math.PI * 2);
            else ctx.rect(25, 25, 60, 60);
            ctx.fill(); ctx.stroke();
            document.getElementById('shape-name').innerText = (currentShapeType === 'sphere') ? "원" : "단면";
        }

        function updatePlanePos() {
            if (!planeMesh) return;
            planeMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), clippingPlane.normal);
            planeMesh.position.copy(clippingPlane.normal).multiplyScalar(-clippingPlane.constant);
        }

        function setMode(m) {
            interactionMode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-' + m));
            controls.enabled = (m === 'rotate');
            wrapper.style.cursor = (m === 'rotate') ? 'grab' : 'crosshair';
        }

        function changeColor(c) { shapeColor = new THREE.Color(c).getHex(); if (currentMesh) currentMesh.material.color.setHex(shapeColor); }
        function changeShape(t, b) { document.querySelectorAll('.btn-shape').forEach(x => x.classList.remove('active')); b.classList.add('active'); createShape(t); resetView(); }
        function resetView() { document.getElementById('section-preview').classList.remove('visible'); gsap.to(clippingPlane, { constant: 10, duration: 0.5, onUpdate: updatePlanePos }); }
        function onWindowResize() { camera.aspect = wrapper.clientWidth / wrapper.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(wrapper.clientWidth, wrapper.clientHeight); }
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    </script>
</body>

</html>
